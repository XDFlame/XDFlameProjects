		<style>

			div.container {
				grid-template-columns: repeat(2, 1fr);
				gap: 0.5em;
			}

			@media(max-width: 1000px) {
				div.container {
					grid-template-columns: 1fr;
				}
			}

			.button {
				width: 100%;
				height: 10rem;
				position: relative;
			}

			.button::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-image: url('style/images/fire.webp');
				border-radius: var(--borderRadius);
				transition: var(--transition);
				background-size: cover;
				background-position: center;
			}

			button {
				width: 100%;
				height: 100%;
				line-height: 1em;
				max-height: unset;
				background-color: rgba(0,0,0,0);
				-webkit-text-stroke: 0.05em black;
				font-size: 2.5rem;
				font-weight: 400;
				backdrop-filter: blur(5px);
				position: relative;
			}

			button:hover {
				backdrop-filter: none;
				transform: scale(1.03,1.03);
				cursor: pointer;
			}

			.button:has(> button:hover)::before {
				transform: scale(1.03,1.03);
			}

			.discord::before {
				background-image: url(style/images/discord.webp)
			}

			.github::before {
				background-image: url(style/images/github.webp)
			}

			.ao::before {
				background-image: url(style/images/ao.webp)
			}

			.ep::before {
				background-image: url(style/images/ep.webp);
				background-color: rgb(20, 20, 20);
			}

			.ar::before {
				background-image: url(style/images/ar.webp);
				background-color: white
			}

		</style>

	</head>

	<body>

			<header>
				Projects

				<div class="button discord">

				</div>

				</div>

				<div class="button ao">
					<button onclick="window.location.href='https://www.desmos.com/calculator/vnigpawaop'">AO Substat Scaling</button>
				</div>

				<div class="button ao">
					<button onclick="window.location.href='https://www.desmos.com/calculator/gmcvnruek2'">AO Sunken Chance Calculator</button>
				</div>

				<div class="button ao">

				</div>

				<div class="button ar">
